name: Run DB Migrations

on:
  push:
    branches: [master]

jobs:
  migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_POOLER_URL: ${{ secrets.DATABASE_POOLER_URL }}
        run: |
          if [ -z "$DATABASE_URL" ] && [ -z "$DATABASE_POOLER_URL" ]; then
            echo "Neither DATABASE_URL nor DATABASE_POOLER_URL secret is set"
            exit 1
          fi

          EFFECTIVE_DB_URL="$DATABASE_URL"
          if [ -n "$DATABASE_POOLER_URL" ]; then
            echo "Using DATABASE_POOLER_URL for migrations"
            EFFECTIVE_DB_URL="$DATABASE_POOLER_URL"
          fi
          export EFFECTIVE_DB_URL

          eval "$(python3 - <<'PY'
          import os
          import shlex
          from urllib.parse import urlparse, unquote

          raw = os.environ.get("EFFECTIVE_DB_URL", "")
          parsed = urlparse(raw)

          if parsed.scheme not in ("postgres", "postgresql"):
              raise SystemExit("DATABASE_URL must use postgres:// or postgresql://")

          host = parsed.hostname or ""
          port = str(parsed.port or 5432)
          user = unquote(parsed.username or "")
          password = unquote(parsed.password or "")
          dbname = (parsed.path or "/postgres").lstrip("/") or "postgres"

          def export_line(key: str, value: str) -> None:
              print(f"export {key}={shlex.quote(value)}")

          export_line("PGHOST", host)
          export_line("PGPORT", port)
          export_line("PGUSER", user)
          export_line("PGPASSWORD", password)
          export_line("PGDATABASE", dbname)
          PY
          )"

          run_migration() {
            local host="$1"
            local port="$2"
            local user="$3"

            echo "Attempting migration via host=$host port=$port user=$user"
            PGSSLMODE=require psql \
              -h "$host" \
              -p "$port" \
              -U "$user" \
              -d "$PGDATABASE" \
              --set ON_ERROR_STOP=1 \
              -f supabase/migrations/001_initial.sql
          }

          if [[ "$PGHOST" =~ ^db\.([a-z0-9]+)\.supabase\.co$ ]] && [ -z "$DATABASE_POOLER_URL" ]; then
            if ! getent ahostsv4 "$PGHOST" >/dev/null; then
              echo "::error::Migration cannot run from GitHub Actions: $PGHOST is IPv6-only and DATABASE_POOLER_URL is not configured."
              echo "::error::Set DATABASE_POOLER_URL secret to Supabase Session Pooler URI (IPv4-compatible)."
              exit 1
            fi
          fi

          run_migration "$PGHOST" "$PGPORT" "$PGUSER"
          echo "Migration succeeded using direct DATABASE_URL host"

name: Run DB Migrations

on:
  push:
    branches: [master]

jobs:
  migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is not set"
            exit 1
          fi

          DB_URL="$DATABASE_URL"

          # Force IPv4 on GitHub runners where IPv6 routes may be unavailable.
          DB_HOST="$(echo "$DB_URL" | sed -E 's#^postgres(ql)?://[^@]+@([^:/?]+).*$#\2#')"
          DB_HOST_IPV4="$(getent ahostsv4 "$DB_HOST" | awk 'NR==1 {print $1}')"
          if [ -n "$DB_HOST_IPV4" ]; then
            export PGHOSTADDR="$DB_HOST_IPV4"
            echo "Using IPv4 host address for $DB_HOST"
          else
            echo "No IPv4 address found for $DB_HOST; proceeding with default resolution"
          fi

          if [[ "$DB_URL" == *\?* ]]; then
            DB_URL="${DB_URL}&sslmode=require"
          else
            DB_URL="${DB_URL}?sslmode=require"
          fi

          psql "$DB_URL" \
            --set ON_ERROR_STOP=1 \
            -f supabase/migrations/001_initial.sql
